<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Patient</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            padding: 20px;
            color: #333;
        }

        h2 {
            text-align: center;
            color: #4CAF50;
            margin-bottom: 30px;
        }

        /* Form Styling */
        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: 0 auto;
            font-size: 1.1em;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            background-color: #f4f4f4;
        }

        input:focus, textarea:focus {
            border-color: #4CAF50;
            background-color: #fff;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #45a049;
        }

        /* Link Styling */
        a {
            display: inline-block;
            margin-top: 20px;
            text-align: center;
            color: #4CAF50;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
        }

        a:hover {
            color: #388e3c;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            form {
                padding: 15px;
                width: 100%;
                margin: 20px;
            }

            h2 {
                font-size: 1.8em;
            }

            input, textarea {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <h2>Add Patient</h2>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Name" required><br><br>
        <input type="text" name="phone" placeholder="Phone" required><br><br>
        <textarea name="description" placeholder="Description" required></textarea><br><br>
        <button type="submit">Add Patient</button>
    </form>

    <br>
    <a href="{% url 'patient:search_patient' %}">Search Patient</a><br>
    <a href="{% url 'patient:home' %}">Home</a>
</body>
</html>
