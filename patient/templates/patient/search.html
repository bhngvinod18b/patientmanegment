<!DOCTYPE html>
<html>
<head>
    <title>Search Patient</title>
</head>
<body>
    <h1>Search Patient</h1>

    <form method="post" action="{% url 'patient:search_patient' %}">
        {% csrf_token %}
        <label for="phone">Phone Number:</label>
        <input type="text" name="phone" id="phone" required>
        <button type="submit">Search</button>
    </form>

    {% if patient %}
        <h2>Patient Details</h2>
        <p><strong>Name:</strong> {{ patient.name }}</p>
        <p><strong>Phone:</strong> {{ patient.phone }}</p>
        <p><strong>Description:</strong> {{ patient.description }}</p>

        <form method="post" action="{% url 'patient:delete_patient' patient.phone %}">
            {% csrf_token %}
            <button type="submit">Delete Patient</button>
        </form>

    {% elif patient is not None %}
        <p>No patient found.</p>
    {% endif %}

    <br>
    <a href="{% url 'patient:add_patient' %}">Add New Patient</a>
</body>
</html>
